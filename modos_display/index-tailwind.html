<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1> inline: </h1>
    <div class="inline bg-gray-300 text-white">
        Productos
    </div>
    <div class="inline bg-violet-300 text-white">
        Nosotros
    </div>
    <div class="inline bg-purple-400 text-white">
        Servicios
    </div>
    <div class="inline bg-taupe-300 text-white">
        Contacto
    </div>
    <hr>
    <h1> block: </h1>
    <div class="block bg-yellow-300 w-[200px] h-[150px] text-emerald-400">
        Productos
    </div>
    <div class="block bg-blue-400 w-[200px] h-[150px] text-emerald-400">
        Nosotros
    </div>
    <div class="block bg-red-600 w-[200px] h-[150px] text-emerald-400">
        Servicios
    </div>
    <div class="block bg-gray-400 w-[200px] h-[150px] text-emerald-400">
        Contacto
    </div>
</body>
</html>
